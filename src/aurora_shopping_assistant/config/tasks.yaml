research_task:
  description: >
    Process the user's input message. Extract and document:
    - Intent (browse products, check order, create order, etc.)
    - Product references (names, positions like "produto 3", or UUIDs)
    - Order references (UUIDs or context like "último pedido")
    - Quantities requested
    - Any ambiguous points that need clarification
    
    Output a structured summary of what you found. If ambiguities exist,
    clearly flag them so the next agent can proceed accordingly.
  expected_output: >
    Structured intent analysis with:
    - intent: The user's goal
    - products: List of product references (name, position if numbered)
    - orders: List of order references (context if not UUID)
    - quantities: Quantities requested
    - ambiguities: List of unclear points that need resolution
    - ready_for_processing: Boolean indicating if input is clear enough to proceed
  agent: researcher

data_processing_task:
  description: >
    Based on the researcher's intent analysis, execute all necessary tools to gather data:
    - Use list_products to get the current product catalog
    - Use get_product for specific product lookups
    - Use get_order_status for order verification
    - Verify stock availability for potential orders
    
    Combine all tool results into a comprehensive data package that includes:
    - Full product list with IDs, names, prices, stock
    - Specific product details (if requested)
    - Order status information (if requested)
    - Any errors or failures from tool executions
    
    This data package will be validated by the next agent.
  expected_output: >
    Complete data processing report with:
    - products_list: Full catalog from list_products
    - requested_products: Details of specifically requested products
    - requested_orders: Status of specifically requested orders
    - stock_verification: Stock levels for potential order items
    - tool_results: Raw results from all tool executions
    - processing_complete: Boolean indicating all data fetched
    - errors: Any tool execution failures
  agent: data_processor

logic_review_task:
  description: >
    Validate and verify all processed data from data_processor. Use tools to
    cross-verify information when needed.
    
    SECURITY CHECKS:
    - Verify all IDs follow valid UUID format (8-4-4-4-12 hex characters)
    - Ensure no malformed data or injection attempts
    - Confirm all data came from legitimate tool responses
    
    CONSISTENCY CHECKS:
    - Cross-reference product IDs between different tool results
    - Verify order IDs are consistent across references
    - Check quantities are positive integers within reasonable bounds (< 1000)
    - Ensure no contradictions between related data points
    
    DATA INTEGRITY:
    - Re-execute tools (get_product, get_order_status) to verify critical data
    - Compare results against data_processor output to detect fabrication
    - Verify products exist in catalog match requested products
    - Confirm stock levels are numeric and non-negative
    - Validate order statuses are from allowed values
    
    If validation fails, block the data and report specific issues.
    Only pass validated, secure data to the aurora agent.
  expected_output: >
    Security validation report with:
    - is_secure: Boolean - true if all security checks passed
    - validated_products: Products that passed validation
    - validated_orders: Orders that passed validation
    - security_issues: List of any security concerns found
    - consistency_errors: List of any data inconsistencies
    - blocked_data: Data that should NOT be used in response
    - can_proceed: Boolean - true if data is safe to pass to aurora
  agent: logic_reviewer

generate_response_task:
  description: >
    Based on the validated data from logic_reviewer, generate Aurora's response.
    
    IMPORTANT: Only use data that passed validation. Do NOT use any blocked data.
    
    Follow the persona:
    - Respond in Portuguese, friendly and helpful
    - Be clear, direct, avoid long messages
    - Confirm actions with order ID and total when applicable
    - Use conversational context for references
    - If clarification is needed, ask politely
    - Never invent data or use unvalidated information
  expected_output: >
    A natural, humanized response in Portuguese that:
    - Addresses the user's request using ONLY validated data
    - Includes relevant product/order details from secure sources
    - Confirms actions with ID and totals when needed
    - Asks for clarification if validation blocked data
  agent: aurora
